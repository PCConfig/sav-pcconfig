<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PC CONFIG | Suivi de réparation</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#fff;font-family:'Inter',sans-serif;min-height:100vh}

/* HEADER */
header{background:#111;border-bottom:2px solid #f5a623;padding:1rem 1.5rem;display:flex;align-items:center;gap:1rem}
.logo-txt{font-family:'Rajdhani',sans-serif;font-size:1.6rem;font-weight:700;letter-spacing:2px}
.logo-txt span{color:#f5a623}
.logo-sub{font-size:.65rem;color:#666;letter-spacing:3px;text-transform:uppercase;margin-top:.1rem}

/* HERO */
.hero{text-align:center;padding:3rem 1rem 2rem}
.hero h1{font-family:'Rajdhani',sans-serif;font-size:2rem;font-weight:700;letter-spacing:1px;margin-bottom:.5rem}
.hero h1 span{color:#f5a623}
.hero p{color:#888;font-size:.9rem}

/* SEARCH */
.search-box{max-width:520px;margin:0 auto 2rem;padding:0 1rem}
.search-row{display:flex;gap:.5rem}
.search-input{flex:1;background:#1a1a1a;border:2px solid #333;color:#fff;padding:.8rem 1rem;border-radius:8px;font-size:.95rem;font-family:'Inter',sans-serif;transition:border-color .2s}
.search-input:focus{outline:none;border-color:#f5a623}
.search-input::placeholder{color:#555}
.btn-search{background:#f5a623;color:#000;border:none;padding:.8rem 1.4rem;border-radius:8px;font-weight:700;font-size:.9rem;cursor:pointer;transition:opacity .2s;white-space:nowrap}
.btn-search:hover{opacity:.85}
.hint{font-size:.75rem;color:#555;margin-top:.6rem;text-align:center}

/* MESSAGES */
.msg-error{background:#1a0a0a;border:1px solid #c62828;color:#ef9a9a;padding:.8rem 1rem;border-radius:8px;font-size:.85rem;text-align:center;max-width:520px;margin:0 auto .5rem;display:none}
.msg-error.show{display:block}
.msg-loading{text-align:center;color:#f5a623;font-size:.85rem;padding:1rem;display:none}
.msg-loading.show{display:block}

/* CARTE RÉSULTAT */
.result-wrap{max-width:560px;margin:0 auto;padding:0 1rem 3rem}
.card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.4);display:none}
.card.show{display:block}

/* Bandeau statut */
.card-header{padding:1.2rem 1.4rem;display:flex;align-items:center;justify-content:space-between}
.card-id{font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:700;color:#fff;letter-spacing:1px}
.card-date{font-size:.75rem;color:rgba(255,255,255,.7)}
.statut-badge{background:rgba(255,255,255,.15);color:#fff;padding:.3rem .8rem;border-radius:4px;font-size:.75rem;font-weight:700;letter-spacing:.5px}

/* Corps */
.card-body{padding:1.4rem}
.client-name{font-size:1.1rem;font-weight:600;color:#111;margin-bottom:.3rem}
.machine-name{font-size:.9rem;color:#555;margin-bottom:1.2rem}

/* Infos grid */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-bottom:1.2rem}
.info-item{background:#f8f8f8;border-radius:8px;padding:.7rem .9rem}
.info-label{font-size:.65rem;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-bottom:.2rem}
.info-val{font-size:.85rem;font-weight:600;color:#222}
.info-val.orange{color:#f5a623}

/* Timeline */
.timeline-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#888;margin-bottom:.6rem}
.timeline{border-left:2px solid #f0f0f0;padding-left:1rem}
.tl-item{position:relative;padding:.4rem 0;font-size:.8rem;color:#555;line-height:1.4}
.tl-item::before{content:'';position:absolute;left:-1.4rem;top:.6rem;width:8px;height:8px;border-radius:50%;background:#f5a623;border:2px solid #fff;box-shadow:0 0 0 1px #f5a623}

/* Statut étapes */
.steps{display:flex;justify-content:space-between;margin-bottom:1.2rem;position:relative}
.steps::before{content:'';position:absolute;top:14px;left:0;right:0;height:2px;background:#eee;z-index:0}
.step{display:flex;flex-direction:column;align-items:center;gap:.3rem;flex:1;z-index:1}
.step-dot{width:28px;height:28px;border-radius:50%;background:#eee;border:2px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:.7rem;transition:.3s}
.step-dot.done{background:#f5a623;border-color:#f5a623;color:#000}
.step-dot.active{background:#111;border-color:#f5a623;color:#f5a623;box-shadow:0 0 0 3px rgba(245,166,35,.2)}
.step-label{font-size:.55rem;color:#999;text-align:center;max-width:48px;line-height:1.2}
.step-label.active{color:#111;font-weight:600}

/* Contact */
.card-footer{background:#111;padding:1rem 1.4rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:gap}
.shop-info{font-size:.75rem;color:#888;line-height:1.6}
.shop-info strong{color:#fff}
.btn-call{background:#f5a623;color:#000;text-decoration:none;padding:.5rem 1rem;border-radius:6px;font-weight:700;font-size:.8rem}

/* Responsive */
@media(max-width:480px){
  .info-grid{grid-template-columns:1fr}
  .steps{display:none}
  .card-footer{flex-direction:column;gap:.8rem;text-align:center}
}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo-txt">PC <span>CONFIG</span></div>
    <div class="logo-sub">E-Sport · Gaming · SAV</div>
  </div>
</header>

<div class="hero">
  <h1>Suivi de <span>réparation</span></h1>
  <p>Entrez votre numéro de dossier ou votre email pour suivre l'avancement</p>
</div>

<div class="search-box">
  <div class="search-row">
    <input class="search-input" id="search-input" type="text" placeholder="Ex: SAV-260303-0E15 ou votre email..." autocomplete="off" />
    <button class="btn-search" onclick="rechercher()">🔍 Suivre</button>
  </div>
  <div class="hint">Numéro de dossier reçu par email · ou votre adresse email</div>
</div>

<div class="msg-error" id="msg-error"></div>
<div class="msg-loading" id="msg-loading">⏳ Recherche en cours...</div>

<div class="result-wrap">
  <div class="card" id="result-card"></div>
</div>

<script>
// ══ CONFIGURATION ══
// L'URL Apps Script est récupérée depuis le paramètre URL ou stockée localement
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz_3WLXBZ5CFGzYakXNm0IYOo42Wq_aUi-xCYghvYoTU3roT3UbvjMJ6IwUiX_U1UOA/exec';
function getUrl(){
  const params = new URLSearchParams(window.location.search);
  const u = params.get('url');
  if(u) return u;
  try{ return localStorage.getItem('pcconfig_sheet_url') || APPS_SCRIPT_URL; }catch(e){ return APPS_SCRIPT_URL; }
}

// ══ ÉTAPES STATUT ══
const ETAPES = [
  {label:'Déposé', emoji:'📥'},
  {label:'Diagnostic', emoji:'🔍'},
  {label:'Devis', emoji:'📋'},
  {label:'Réparation', emoji:'🔧'},
  {label:'Prêt', emoji:'🎉'}
];
const ETAPE_MAP = {
  'Déposé': 0,
  'Diagnostic en cours': 1,
  'Devis envoyé': 2,
  'En attente accord client': 2,
  'En attente pièce': 3,
  'En réparation': 3,
  'Terminé - prêt à retirer': 4,
  'Non réparable': 4,
  'Retiré / clôturé': 4,
  'Annulé': 4
};

const STATUT_COLORS = {
  'Déposé':                      '#1a6bbf',
  'Diagnostic en cours':         '#7b1fa2',
  'Devis envoyé':                '#b36a00',
  'En attente accord client':    '#b36a00',
  'En attente pièce':            '#555',
  'En réparation':               '#2e7d32',
  'Terminé - prêt à retirer':    '#00796b',
  'Non réparable':               '#c62828',
  'Retiré / clôturé':            '#444',
  'Annulé':                      '#c62828'
};

// ══ RECHERCHE JSONP ══
function rechercher(){
  const q = document.getElementById('search-input').value.trim();
  if(!q){ showError('Entrez un numéro de dossier ou un email.'); return; }

  const url = getUrl();
  if(!url){ showError('Configuration manquante. Contactez la boutique.'); return; }

  document.getElementById('msg-error').classList.remove('show');
  document.getElementById('result-card').classList.remove('show');
  document.getElementById('msg-loading').classList.add('show');

  const cbName = '_gsSuivi_' + Date.now();
  const script = document.createElement('script');

  const timer = setTimeout(()=>{
    delete window[cbName];
    if(script.parentNode) script.parentNode.removeChild(script);
    document.getElementById('msg-loading').classList.remove('show');
    showError('Délai dépassé. Vérifiez votre connexion et réessayez.');
  }, 10000);

  window[cbName] = function(data){
    clearTimeout(timer);
    delete window[cbName];
    if(script.parentNode) script.parentNode.removeChild(script);
    document.getElementById('msg-loading').classList.remove('show');
    handleResult(data, q);
  };

  script.src = url + '?action=find&q=' + encodeURIComponent(q.toLowerCase()) + '&callback=' + cbName;
  document.head.appendChild(script);
}

function handleResult(data, q){
  if(!data || data.error || (Array.isArray(data) && !data.length)){
    showError('Aucun dossier trouvé pour « ' + q + ' ». Vérifiez votre numéro de ticket ou email.');
    return;
  }
  const t = Array.isArray(data) ? data[0] : data;
  afficherTicket(t);
}

function showError(msg){
  const el = document.getElementById('msg-error');
  el.textContent = msg;
  el.classList.add('show');
}

// ══ AFFICHAGE TICKET ══
function afficherTicket(t){
  const statut = t.statut || 'Déposé';
  const couleur = STATUT_COLORS[statut] || '#333';
  const etapeIdx = ETAPE_MAP[statut] ?? 0;
  const machine = [t.marque, (t.modele||'').replace((t.marque||'')+' - ','')].filter(Boolean).join(' ');
  const prestas = (t.prestations||[]).join(' · ') || t.panne || '—';
  const montant = t.devis ? t.devis + ' €' : '—';
  const delai = t.delai || '—';

  // Étapes visuelles
  const stepsHtml = ETAPES.map((e, i)=>{
    const cls = i < etapeIdx ? 'done' : i === etapeIdx ? 'active' : '';
    const lblCls = i === etapeIdx ? 'active' : '';
    return `<div class="step">
      <div class="step-dot ${cls}">${e.emoji}</div>
      <div class="step-label ${lblCls}">${e.label}</div>
    </div>`;
  }).join('');

  // Historique (sans infos sensibles)
  const histoHtml = (t.history||[])
    .filter(h => !h.includes('email') || h.includes('Mail'))
    .slice(-6)
    .reverse()
    .map(h => `<div class="tl-item">${h}</div>`)
    .join('') || '<div class="tl-item" style="color:#bbb">Aucun historique</div>';

  const card = document.getElementById('result-card');
  card.innerHTML = `
    <!-- Header statut -->
    <div class="card-header" style="background:${couleur}">
      <div>
        <div class="card-id">${t.id}</div>
        <div class="card-date">Déposé le ${t.date || '—'}</div>
      </div>
      <div class="statut-badge">${statut}</div>
    </div>

    <!-- Corps -->
    <div class="card-body">
      <div class="client-name">${t.prenom || ''} ${t.nom || ''}</div>
      <div class="machine-name">📱 ${machine || '—'}</div>

      <!-- Étapes -->
      <div class="steps">${stepsHtml}</div>

      <!-- Infos -->
      <div class="info-grid">
        <div class="info-item">
          <div class="info-label">Prestation(s)</div>
          <div class="info-val">${prestas}</div>
        </div>
        <div class="info-item">
          <div class="info-label">Délai estimé</div>
          <div class="info-val">${delai}</div>
        </div>
        <div class="info-item">
          <div class="info-label">Montant</div>
          <div class="info-val orange">${montant}</div>
        </div>
        <div class="info-item">
          <div class="info-label">Urgence</div>
          <div class="info-val">${t.urgence || 'Normale'}</div>
        </div>
      </div>

      <!-- Historique -->
      <div class="timeline-title">⚡ Historique de votre dossier</div>
      <div class="timeline">${histoHtml}</div>
    </div>

    <!-- Footer boutique -->
    <div class="card-footer">
      <div class="shop-info">
        <strong>PC CONFIG</strong><br>
        📍 25 rue Montgallet, Paris 12<br>
        📞 01 XX XX XX XX
      </div>
      <a class="btn-call" href="tel:+33XXXXXXXXX">📞 Appeler</a>
    </div>
  `;
  card.classList.add('show');
}

// ══ ENTRÉE CLAVIER ══
document.getElementById('search-input').addEventListener('keydown', function(e){
  if(e.key === 'Enter') rechercher();
});

// ══ PARAMÈTRE URL AUTO ══
// Si l'URL contient ?id=SAV-XXX, recherche automatiquement
window.addEventListener('DOMContentLoaded', ()=>{
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if(id){
    document.getElementById('search-input').value = id;
    rechercher();
  }
});
</script>
</body>
</html>
